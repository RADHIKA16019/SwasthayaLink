<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwasthayaLink – Your Complete Health Companion</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Fraunces:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   SWASTHAYALINK — GLOBAL DESIGN SYSTEM
   Aesthetic: Clinical Luxury — clean precision meets warm vitality
═══════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  /* Color Tokens */
  --emerald:       #00C896;
  --emerald-deep:  #00A07A;
  --emerald-mist:  #E6FAF4;
  --sapphire:      #0EA5E9;
  --sapphire-mist: #E0F4FF;
  --coral:         #FF4757;
  --coral-mist:    #FFF0F1;
  --amber:         #F59E0B;
  --amber-mist:    #FFF8E7;
  --violet:        #7C3AED;
  --violet-mist:   #F5F0FF;

  /* Light Theme */
  --bg-base:    #F7FDFB;
  --bg-surface: #FFFFFF;
  --bg-subtle:  #F0FAF6;
  --border:     rgba(0,200,150,0.15);
  --border-hard:#E2EBE8;
  --text-1:     #0D1F1A;
  --text-2:     #2D5048;
  --text-3:     #6B8E82;
  --text-4:     #A8C4BB;
  --shadow-sm:  0 2px 8px rgba(0,150,100,0.08);
  --shadow-md:  0 8px 32px rgba(0,150,100,0.12);
  --shadow-lg:  0 20px 60px rgba(0,150,100,0.18);
  --shadow-glow:0 0 40px rgba(0,200,150,0.25);

  /* Spacing */
  --nav-h:64px;
  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:24px;
  --radius-xl:32px;
}

[data-theme="dark"]{
  --bg-base:    #0A1412;
  --bg-surface: #111C19;
  --bg-subtle:  #162420;
  --border:     rgba(0,200,150,0.12);
  --border-hard:#1E3530;
  --text-1:     #E8F5F1;
  --text-2:     #A0C4BA;
  --text-3:     #5A8578;
  --text-4:     #2E5049;
  --shadow-sm:  0 2px 8px rgba(0,0,0,0.4);
  --shadow-md:  0 8px 32px rgba(0,0,0,0.5);
  --shadow-lg:  0 20px 60px rgba(0,0,0,0.6);
}

html{scroll-behavior:smooth;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg-base);
  color:var(--text-1);
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
  transition:background 0.4s ease,color 0.4s ease;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--emerald);border-radius:99px;}

/* ── TYPOGRAPHY ── */
.font-display{font-family:'Fraunces',serif;}
h1,h2,h3{font-family:'Fraunces',serif;line-height:1.2;}
.text-gradient{
  background:linear-gradient(135deg,var(--emerald),var(--sapphire));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── NAVBAR ── */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:900;
  height:var(--nav-h);
  background:rgba(247,253,251,0.85);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  transition:background 0.4s;
}
[data-theme="dark"] .navbar{background:rgba(10,20,18,0.9);}
.navbar-inner{
  max-width:1200px;margin:0 auto;height:100%;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
}
.nav-brand{
  display:flex;align-items:center;gap:10px;
  text-decoration:none;cursor:pointer;
}
.nav-logo{
  width:38px;height:38px;border-radius:12px;
  background:linear-gradient(135deg,var(--emerald),var(--sapphire));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;box-shadow:var(--shadow-sm);
  flex-shrink:0;
}
.nav-title{
  font-family:'Fraunces',serif;
  font-size:22px;font-weight:800;
  background:linear-gradient(135deg,var(--emerald),var(--sapphire));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-0.5px;
}
.nav-actions{display:flex;align-items:center;gap:8px;}
.nav-btn{
  width:40px;height:40px;border-radius:12px;border:none;
  background:var(--bg-subtle);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-2);font-size:18px;
  transition:background 0.2s,transform 0.15s;
}
.nav-btn:hover{background:var(--emerald-mist);transform:scale(1.05);}

/* ── DRAWER ── */
.drawer-overlay{
  position:fixed;inset:0;z-index:950;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);
  animation:fadeIn 0.2s ease;
}
.drawer{
  position:fixed;left:0;top:0;bottom:0;z-index:960;
  width:300px;background:var(--bg-surface);
  box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;
  animation:slideInLeft 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.drawer-header{
  padding:24px 24px 16px;
  border-bottom:1px solid var(--border-hard);
}
.drawer-nav{flex:1;overflow-y:auto;padding:12px;}
.drawer-item{
  display:flex;align-items:center;gap:14px;
  padding:12px 16px;border-radius:14px;
  cursor:pointer;transition:all 0.2s;
  color:var(--text-2);font-weight:500;font-size:15px;
  border:none;background:transparent;width:100%;text-align:left;
}
.drawer-item:hover{background:var(--emerald-mist);color:var(--emerald-deep);}
.drawer-item.active{
  background:linear-gradient(135deg,var(--emerald-mist),var(--sapphire-mist));
  color:var(--emerald-deep);font-weight:700;
}
.drawer-icon{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  transition:transform 0.2s;
}
.drawer-item:hover .drawer-icon{transform:scale(1.1);}
.drawer-footer{
  padding:16px 24px;border-top:1px solid var(--border-hard);
  font-size:12px;color:var(--text-3);text-align:center;
}

/* ── PAGE WRAPPER ── */
.page-content{
  padding-top:var(--nav-h);
  min-height:100vh;
}
.container{max-width:1200px;margin:0 auto;padding:0 20px;}
.section{padding:32px 0;}

/* ── CARDS ── */
.card{
  background:var(--bg-surface);
  border:1px solid var(--border-hard);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-sm);
  transition:box-shadow 0.3s,transform 0.3s,border-color 0.3s;
}
.card:hover{
  box-shadow:var(--shadow-md);
  transform:translateY(-2px);
  border-color:var(--border);
}
.card-sm{border-radius:var(--radius-md);}
.card-glass{
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.5);
}
[data-theme="dark"] .card-glass{background:rgba(17,28,25,0.8);}

/* ── STAT CARD ── */
.stat-card{
  padding:20px;cursor:default;
}
.stat-card .icon-wrap{
  width:48px;height:48px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;margin-bottom:12px;
}
.stat-card .stat-val{
  font-family:'Fraunces',serif;
  font-size:28px;font-weight:800;line-height:1;
  margin-bottom:4px;
}
.stat-card .stat-label{font-size:13px;color:var(--text-3);font-weight:500;}
.stat-card .stat-change{
  font-size:12px;font-weight:600;margin-top:6px;
}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 20px;border-radius:12px;font-weight:600;
  font-family:'DM Sans',sans-serif;font-size:14px;
  cursor:pointer;transition:all 0.2s;border:none;
}
.btn-primary{
  background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));
  color:#fff;box-shadow:0 4px 16px rgba(0,200,150,0.3);
}
.btn-primary:hover{
  box-shadow:0 8px 24px rgba(0,200,150,0.45);
  transform:translateY(-1px);
}
.btn-primary:active{transform:translateY(0);}
.btn-outline{
  background:transparent;
  border:2px solid var(--emerald);color:var(--emerald);
}
.btn-outline:hover{background:var(--emerald-mist);}
.btn-ghost{
  background:var(--bg-subtle);color:var(--text-2);
}
.btn-ghost:hover{background:var(--border-hard);}
.btn-danger{
  background:linear-gradient(135deg,#FF4757,#c0392b);color:#fff;
  box-shadow:0 4px 16px rgba(255,71,87,0.35);
}
.btn-danger:hover{box-shadow:0 8px 24px rgba(255,71,87,0.5);transform:translateY(-1px);}
.btn-lg{padding:14px 28px;font-size:16px;border-radius:16px;}
.btn-xl{padding:18px 36px;font-size:18px;border-radius:18px;}
.btn-sm{padding:6px 14px;font-size:13px;border-radius:10px;}
.btn-icon{padding:10px;border-radius:12px;}
.btn-full{width:100%;}

/* ── INPUTS ── */
.input,.textarea,.select{
  width:100%;padding:12px 16px;
  border:2px solid var(--border-hard);
  border-radius:12px;
  background:var(--bg-surface);
  color:var(--text-1);
  font-family:'DM Sans',sans-serif;font-size:14px;
  transition:border-color 0.2s,box-shadow 0.2s;
  outline:none;
}
.input:focus,.textarea:focus,.select:focus{
  border-color:var(--emerald);
  box-shadow:0 0 0 3px rgba(0,200,150,0.12);
}
.textarea{resize:vertical;min-height:100px;}
.input-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.input-label{font-size:13px;font-weight:600;color:var(--text-2);}

/* ── BADGES ── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:99px;
  font-size:12px;font-weight:700;letter-spacing:0.3px;
}
.badge-green{background:var(--emerald-mist);color:var(--emerald-deep);}
.badge-blue{background:var(--sapphire-mist);color:var(--sapphire);}
.badge-red{background:var(--coral-mist);color:var(--coral);}
.badge-amber{background:var(--amber-mist);color:var(--amber);}
.badge-violet{background:var(--violet-mist);color:var(--violet);}

/* ── PROGRESS ── */
.progress-wrap{background:var(--bg-subtle);border-radius:99px;overflow:hidden;}
.progress-bar{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--emerald),var(--sapphire));
  transition:width 1.2s cubic-bezier(0.34,1.56,0.64,1);
}

/* ── SOS BUTTON ── */
.sos-fab{
  position:fixed;bottom:28px;right:28px;z-index:800;
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,#FF4757,#c0392b);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:1px;
  color:#fff;font-weight:900;font-size:11px;
  font-family:'Fraunces',serif;letter-spacing:1px;
  box-shadow:0 4px 24px rgba(255,71,87,0.6),0 0 0 0 rgba(255,71,87,0.4);
  animation:sosPulse 2s ease infinite;
  transition:transform 0.15s;
}
.sos-fab:hover{transform:scale(1.1);}
.sos-fab:active{transform:scale(0.95);}
.sos-fab .sos-icon{font-size:22px;line-height:1;}

/* ── MARQUEE ── */
.marquee-outer{overflow:hidden;position:relative;}
.marquee-track{
  display:flex;gap:16px;
  animation:marquee 30s linear infinite;
  width:max-content;
}
.marquee-track:hover{animation-play-state:paused;}
.marquee-card{
  flex-shrink:0;width:220px;height:160px;
  border-radius:20px;overflow:hidden;position:relative;
  display:flex;align-items:flex-end;padding:16px;
  cursor:default;
}

/* ── WATER DROPS ── */
.water-grid{display:flex;gap:6px;flex-wrap:wrap;}
.drop{
  font-size:28px;cursor:pointer;
  filter:grayscale(1) opacity(0.3);
  transition:filter 0.3s,transform 0.2s;
  user-select:none;
}
.drop.filled{filter:none;}
.drop:hover{transform:scale(1.2);}

/* ── CHAT BUBBLES ── */
.chat-wrap{display:flex;flex-direction:column;gap:12px;}
.chat-bubble{
  padding:12px 16px;border-radius:18px;max-width:80%;
  font-size:14px;line-height:1.55;
  animation:fadeSlideUp 0.3s ease both;
}
.chat-user{
  background:linear-gradient(135deg,var(--emerald),var(--emerald-deep));
  color:#fff;align-self:flex-end;
  border-bottom-right-radius:4px;
}
.chat-ai{
  background:var(--bg-subtle);color:var(--text-1);
  align-self:flex-start;border:1px solid var(--border-hard);
  border-bottom-left-radius:4px;
}

/* ── FIRST AID STEPS ── */
.step-card{
  display:flex;gap:16px;align-items:flex-start;
  padding:20px;border-radius:var(--radius-md);
  border:1px solid var(--border-hard);
  background:var(--bg-surface);
  animation:fadeSlideUp 0.4s ease both;
}
.step-num{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--emerald),var(--sapphire));
  color:#fff;font-weight:800;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-family:'Fraunces',serif;
}

/* ── EMERGENCY BUTTONS ── */
.em-btn{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;border-radius:20px;border:none;cursor:pointer;
  color:#fff;font-family:'Fraunces',serif;font-size:18px;font-weight:700;
  transition:transform 0.15s,box-shadow 0.15s;
  width:100%;text-align:left;
  box-shadow:0 6px 24px rgba(0,0,0,0.2);
}
.em-btn:hover{transform:scale(1.02);box-shadow:0 10px 36px rgba(0,0,0,0.3);}
.em-btn:active{transform:scale(0.98);}
.em-btn .em-num{
  font-size:28px;font-weight:900;letter-spacing:-1px;
  opacity:0.9;
}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInLeft{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes sosPulse{
  0%{box-shadow:0 4px 24px rgba(255,71,87,0.6),0 0 0 0 rgba(255,71,87,0.4)}
  70%{box-shadow:0 4px 24px rgba(255,71,87,0.6),0 0 0 20px rgba(255,71,87,0)}
  100%{box-shadow:0 4px 24px rgba(255,71,87,0.6),0 0 0 0 rgba(255,71,87,0)}
}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes bounceIn{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes gradient-shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes celebration{0%{transform:scale(0) rotate(-10deg)}60%{transform:scale(1.15) rotate(3deg)}100%{transform:scale(1) rotate(0)}}
@keyframes typewriter{from{width:0}to{width:100%}}

.animate-fade{animation:fadeSlideUp 0.5s ease both;}
.animate-float{animation:float 3s ease infinite;}
.animate-spin{animation:spin 1s linear infinite;}
.animate-pulse{animation:pulse 1.5s ease infinite;}
.animate-bounce-in{animation:bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;}
.animate-celebration{animation:celebration 0.6s cubic-bezier(0.34,1.56,0.64,1) both;}

/* ── CHART SVG ── */
.chart-area{overflow:visible;}
.chart-line{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.chart-dot{cursor:pointer;transition:r 0.2s;}
.chart-dot:hover{r:6;}

/* ── TABS ── */
.tab-list{
  display:flex;gap:4px;padding:4px;
  background:var(--bg-subtle);border-radius:14px;
  flex-wrap:wrap;
}
.tab-btn{
  padding:8px 16px;border-radius:10px;border:none;
  background:transparent;color:var(--text-3);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.tab-btn.active{
  background:var(--bg-surface);color:var(--emerald-deep);
  box-shadow:var(--shadow-sm);
}
.tab-btn:hover:not(.active){color:var(--text-2);background:rgba(0,200,150,0.05);}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fadeIn 0.2s ease;
}
.modal{
  background:var(--bg-surface);border-radius:var(--radius-xl);
  padding:32px;max-width:500px;width:100%;
  box-shadow:var(--shadow-lg);
  animation:bounceIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  max-height:90vh;overflow-y:auto;
}

/* ── TOOLTIP ── */
.tooltip{
  position:relative;
}
.tooltip-text{
  position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:var(--text-1);color:var(--bg-surface);
  padding:6px 10px;border-radius:8px;font-size:12px;white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:10;
}
.tooltip:hover .tooltip-text{opacity:1;}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border-hard);margin:20px 0;}

/* ── SECTION HEADING ── */
.section-title{
  font-family:'Fraunces',serif;
  font-size:28px;font-weight:800;margin-bottom:6px;
}
.section-sub{font-size:15px;color:var(--text-3);margin-bottom:24px;}

/* ── SKELETON LOADER ── */
.skeleton{
  background:linear-gradient(90deg,var(--bg-subtle) 25%,var(--border-hard) 50%,var(--bg-subtle) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s ease infinite;
  border-radius:8px;
}

/* ── FOOTER ── */
.footer{
  background:var(--bg-surface);
  border-top:1px solid var(--border-hard);
  padding:48px 0 28px;margin-top:60px;
}
.footer-grid{
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr;
  gap:40px;margin-bottom:40px;
}
.footer-brand-desc{font-size:14px;color:var(--text-3);line-height:1.7;margin-top:10px;}
.footer-heading{font-weight:700;font-size:14px;margin-bottom:14px;color:var(--text-2);}
.footer-link{
  display:block;font-size:14px;color:var(--text-3);
  margin-bottom:8px;cursor:pointer;transition:color 0.2s;
}
.footer-link:hover{color:var(--emerald);}
.footer-bottom{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:24px;border-top:1px solid var(--border-hard);
  font-size:13px;color:var(--text-3);flex-wrap:wrap;gap:8px;
}

/* ── REMEDY VIDEO CARD ── */
.video-card{cursor:pointer;overflow:hidden;}
.video-thumb{
  height:140px;background:var(--bg-subtle);
  display:flex;align-items:center;justify-content:center;
  font-size:48px;position:relative;
  border-radius:var(--radius-md) var(--radius-md) 0 0;
  overflow:hidden;
}
.play-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.3);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.2s;
}
.video-card:hover .play-overlay{opacity:1;}
.play-circle{
  width:52px;height:52px;background:#fff;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:20px;
}

/* ── VITALS ── */
.vital-card{
  padding:16px;border-radius:var(--radius-md);
  border:1px solid var(--border-hard);background:var(--bg-surface);
  transition:all 0.3s;
}
.vital-val{
  font-family:'Fraunces',serif;font-size:24px;font-weight:800;
}
.vital-label{font-size:12px;color:var(--text-3);font-weight:500;margin-top:2px;}

/* ── CIRCULAR PROGRESS ── */
svg.cpr{overflow:visible;}
.cpr-track{fill:none;stroke:var(--border-hard);}
.cpr-fill{
  fill:none;stroke-linecap:round;
  transition:stroke-dashoffset 1.2s cubic-bezier(0.34,1.56,0.64,1);
}

/* ── PROFILE ── */
.profile-avatar{
  width:96px;height:96px;border-radius:28px;
  background:linear-gradient(135deg,var(--emerald),var(--sapphire));
  display:flex;align-items:center;justify-content:center;
  font-size:40px;margin:0 auto 16px;
  box-shadow:var(--shadow-md);
}
.profile-stat{
  text-align:center;padding:16px;
  border-right:1px solid var(--border-hard);
}
.profile-stat:last-child{border-right:none;}
.profile-stat-val{font-family:'Fraunces',serif;font-size:22px;font-weight:800;}
.profile-stat-label{font-size:12px;color:var(--text-3);}

/* ── WORKOUT TIMER ── */
.timer-display{
  font-family:'Fraunces',serif;font-size:64px;font-weight:900;
  text-align:center;letter-spacing:-2px;
  background:linear-gradient(135deg,var(--emerald),var(--sapphire));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── MEDICATION ROW ── */
.med-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-radius:14px;
  border:1px solid var(--border-hard);background:var(--bg-surface);
  transition:border-color 0.2s;
}
.med-row:hover{border-color:var(--emerald);}
.med-check{
  width:24px;height:24px;border-radius:8px;border:2px solid var(--border-hard);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;flex-shrink:0;
}
.med-check.checked{background:var(--emerald);border-color:var(--emerald);}

/* ── HERO GRADIENT BG ── */
.hero-bg{
  background:linear-gradient(135deg,var(--emerald-mist) 0%,var(--sapphire-mist) 50%,var(--bg-base) 100%);
  background-size:200% 200%;
  animation:gradient-shift 8s ease infinite;
}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .nav-title{font-size:18px;}
  .footer-grid{grid-template-columns:1fr;gap:24px;}
  .footer-bottom{flex-direction:column;text-align:center;}
  .timer-display{font-size:48px;}
  .modal{padding:20px;}
  .em-btn{padding:16px 18px;font-size:16px;}
  .em-btn .em-num{font-size:22px;}
}
@media(max-width:480px){
  .drawer{width:100%;}
  .sos-fab{bottom:20px;right:20px;width:56px;height:56px;}
}

/* ── CUSTOM RADIO/TOGGLE ── */
.toggle{
  position:relative;width:48px;height:26px;
  background:var(--border-hard);border-radius:99px;
  cursor:pointer;transition:background 0.3s;flex-shrink:0;
}
.toggle.on{background:var(--emerald);}
.toggle::after{
  content:'';position:absolute;top:3px;left:3px;
  width:20px;height:20px;border-radius:50%;background:#fff;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
.toggle.on::after{transform:translateX(22px);}

/* ── SEARCH BAR ── */
.search-bar{
  display:flex;align-items:center;gap:12px;
  background:var(--bg-surface);
  border:2px solid var(--border-hard);border-radius:16px;
  padding:4px 4px 4px 16px;
  transition:border-color 0.2s;
}
.search-bar:focus-within{border-color:var(--emerald);}
.search-input{
  flex:1;border:none;outline:none;background:transparent;
  font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text-1);
}
.search-btn{
  padding:10px 18px;border-radius:12px;border:none;
  background:var(--emerald);color:#fff;cursor:pointer;
  font-weight:600;font-size:13px;transition:opacity 0.2s;
}
.search-btn:hover{opacity:0.9;}

/* ── GRID UTILITIES ── */
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;}
@media(max-width:768px){
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr 1fr;}
}
@media(max-width:480px){
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
}

/* ── QUICK ACTIONS ── */
.quick-action{
  padding:20px 16px;border-radius:20px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;border:1px solid var(--border-hard);
  background:var(--bg-surface);
  transition:all 0.25s;
  text-align:center;
}
.quick-action:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);}
.quick-action .qa-icon{font-size:36px;transition:transform 0.25s;}
.quick-action:hover .qa-icon{transform:scale(1.15);}
.quick-action .qa-label{font-size:13px;font-weight:700;color:var(--text-2);}

const formatTime = (sec) => {
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  if(h>0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
};
const today = () => new Date().toLocaleDateString('en-IN',{weekday:'long',month:'long',day:'numeric'});
const greet = () => {
  const h = new Date().getHours();
  if(h<12) return {text:'Good morning',emoji:'☀️'};
  if(h<17) return {text:'Good afternoon',emoji:'🌤️'};
  return {text:'Good evening',emoji:'🌙'};
};

  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      system,
      messages
    })
  });
  const data = await res.json();
  return data.content?.map(b=>b.text||'').join('')||'Sorry, I could not respond right now.';
};

/* ═══════════════════════════════════════════════════════════════
   CIRCULAR PROGRESS RING
═══════════════════════════════════════════════════════════════ */
const CircularProgress = ({pct=0,size=80,stroke=8,color='#00C896',label='',val=''})=>{
  const r = (size-stroke*2)/2;
  const circ = 2*Math.PI*r;
  const offset = circ - (clamp(pct,0,100)/100)*circ;
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
      <svg width={size} height={size} className="cpr">
        <circle className="cpr-track" cx={size/2} cy={size/2} r={r} strokeWidth={stroke}/>
        <circle className="cpr-fill" cx={size/2} cy={size/2} r={r}
          stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset}
          transform={`rotate(-90 ${size/2} ${size/2})`}/>
        <text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="middle"
          style={{fill:'var(--text-1)',fontFamily:'Fraunces,serif',fontSize:size*0.2,fontWeight:800}}>
          {val||`${Math.round(pct)}%`}
        </text>
      </svg>
      {label && <div style={{fontSize:11,color:'var(--text-3)',fontWeight:600,textTransform:'uppercase',letterSpacing:0.5}}>{label}</div>}
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════════
   MINI LINE CHART (pure SVG)
═══════════════════════════════════════════════════════════════ */
const MiniChart = ({data=[],color='#00C896',height=60,fill=true})=>{
  if(!data.length) return null;
  const W=280,H=height,pad=8;
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const pts=data.map((v,i)=>{
    const x=pad+(i/(data.length-1))*(W-pad*2);
    const y=pad+(1-(v-min)/range)*(H-pad*2);
    return [x,y];
  });
  const pathD=pts.map((p,i)=>`${i===0?'M':'L'}${p[0]},${p[1]}`).join(' ');
  const areaD=`${pathD} L${pts[pts.length-1][0]},${H-pad} L${pts[0][0]},${H-pad} Z`;
  const id=`grad_${color.replace('#','')}`;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H,overflow:'visible'}}>
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {fill&&<path d={areaD} fill={`url(#${id})`}/>}
      <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=>(
        <circle key={i} cx={p[0]} cy={p[1]} r={4} fill={color} className="chart-dot"
          stroke="var(--bg-surface)" strokeWidth="2"/>
      ))}
    </svg>
  );
};

  const [workoutType,setWorkoutType] = useState('Running');

    {id:1,name:'Vitamin D3',dose:'1000 IU',time:'Morning',taken:true,icon:'☀️'},
    {id:2,name:'Omega-3',dose:'500mg',time:'Evening',taken:false,icon:'🐟'},
    {id:3,name:'Magnesium',dose:'200mg',time:'Night',taken:false,icon:'💊'},

  ]);
  const [celebrate,setCelebrate] = useState(false);
  const [celebrateMsg,setCelebrateMsg] = useState('');
  const [steps] = useState(8420);
  const [calories] = useState(1840);
  const [mindfulness,setMindfulness] = useState('');
  const timerRef = useRef();

  useEffect(()=>{
    if(workoutState==='running'){
      timerRef.current = setInterval(()=>setWorkoutSec(s=>s+1),1000);
    } else clearInterval(timerRef.current);
    return ()=>clearInterval(timerRef.current);
  },[workoutState]);

  const startWorkout=()=>{setWorkoutState('running');setWorkoutSec(0);};
  const pauseWorkout=()=>setWorkoutState('paused');
  const resumeWorkout=()=>setWorkoutState('running');
  const stopWorkout=()=>{
    setWorkoutState('idle');
    setCelebrateMsg(`🏋️ ${workoutType} workout — ${formatTime(workoutSec)} completed!`);
    setCelebrate(true);

    if(waterCups<8){
      const next=waterCups+1;
      setWaterCups(next);

const SymptomChecker = ()=>{
  const [messages,setMessages] = useState([
    {role:'ai',text:"Hello! I'm your AI health assistant. Please describe what symptoms you're experiencing, and I'll help analyze them and ask follow-up questions to better understand your condition. Remember, this is for informational purposes only and not a substitute for professional medical advice."}
  ]);
  const [input,setInput] = useState('');
  const [loading,setLoading] = useState(false);
  const [results,setResults] = useState(null);
  const chatRef = useRef();

  const SYSTEM = `You are a compassionate and knowledgeable AI health assistant for SwasthayaLink, India's healthcare platform.
Your role is to:
1. Ask intelligent follow-up questions to understand symptoms better (severity, duration, location, triggers)
2. Analyze symptoms systematically
3. Provide possible conditions in a clear card format using this JSON when you have enough info:
{"showResults":true,"conditions":[{"name":"","likelihood":"High/Medium/Low","description":"","action":"","urgency":"See doctor/Monitor/Emergency"}]}
4. Always recommend consulting a real doctor
5. Be empathetic, clear, and use simple language
6. Ask maximum 4-5 follow-up questions before giving results
Start by asking follow-up questions. After 3-4 exchanges, provide structured results.`;

  const send = async()=>{
    if(!input.trim()||loading) return;
    const userMsg = {role:'user',text:input};
    const newMsgs = [...messages,userMsg];
    setMessages(newMsgs);
    setInput('');
    setLoading(true);
    try{
      const apiMsgs = newMsgs.map(m=>({role:m.role==='ai'?'assistant':'user',content:m.text}));
      const reply = await callClaude(apiMsgs,SYSTEM);
      // Try to parse JSON results
      const jsonMatch = reply.match(/\{[\s\S]*"showResults"[\s\S]*\}/);
      if(jsonMatch){
        try{
          const parsed = JSON.parse(jsonMatch[0]);
          if(parsed.showResults) setResults(parsed.conditions);
        }catch(e){}
      }
      const cleanText = reply.replace(/\{[\s\S]*"showResults"[\s\S]*\}/,'').trim();
      setMessages(prev=>[...prev,{role:'ai',text:cleanText||'Please describe your symptoms in more detail.'}]);
    }catch(e){
      setMessages(prev=>[...prev,{role:'ai',text:'I apologize, I encountered an error. Please try again.'}]);
    }
    setLoading(false);
    setTimeout(()=>chatRef.current?.scrollTo(0,99999),100);
  };

  const urgencyColors = {'Emergency':'#FF4757','See doctor':'#F59E0B','Monitor':'#00C896'};

  return(
    <div className="container section" style={{paddingBottom:80}}>
      <div style={{marginBottom:20}}>
        <h1 className="section-title">🩺 AI Symptom Checker</h1>
        <p className="section-sub">Describe your symptoms and our AI will help analyze them through intelligent questioning</p>
        <div style={{
          background:'var(--amber-mist)',border:'1px solid #FDE68A',
          borderRadius:14,padding:'12px 16px',fontSize:13,color:'#92400E',marginBottom:20
        }}>
          ⚠️ This tool is for informational purposes only. Always consult a qualified healthcare professional for medical advice, diagnosis, or treatment.
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:20,alignItems:'start'}}>
        <div>
          <div className="card" style={{padding:0,overflow:'hidden'}}>
            <div style={{
              padding:'16px 20px',
              background:'linear-gradient(135deg,var(--emerald-mist),var(--sapphire-mist))',
              borderBottom:'1px solid var(--border-hard)',
              display:'flex',alignItems:'center',gap:10
            }}>
              <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,var(--emerald),var(--sapphire))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🤖</div>
              <div>
                <div style={{fontWeight:700,fontSize:15}}>AI Health Assistant</div>
                <div style={{fontSize:12,color:'var(--text-3)'}}>● Online • Claude AI Powered</div>
              </div>
            </div>
            <div ref={chatRef} className="chat-wrap" style={{padding:20,minHeight:320,maxHeight:420,overflowY:'auto'}}>
              {messages.map((m,i)=>(
                <div key={i} className={`chat-bubble chat-${m.role}`} style={{animationDelay:`${i*0.05}s`}}>
                  {m.text}
                </div>
              ))}
              {loading&&(
                <div className="chat-bubble chat-ai">
                  <span className="animate-pulse">Analyzing your symptoms...</span>
                </div>
              )}
            </div>
            <div style={{padding:'12px 16px',borderTop:'1px solid var(--border-hard)',display:'flex',gap:8}}>
              <input className="input" placeholder="Describe your symptoms..." value={input}
                onChange={e=>setInput(e.target.value)}

                      {c.urgency}
                    </span>
                  </div>
                </div>
              ))}
              <button className="btn btn-outline btn-full" style={{marginTop:4}} onClick={()=>{setResults(null);setMessages([{role:'ai',text:"Hello! I'm your AI health assistant. Please describe what symptoms you're experiencing."}]);}}>
                Start New Check
              </button>
            </div>
          ):(
            <div className="card" style={{padding:24}}>
              <div style={{fontSize:48,textAlign:'center',marginBottom:12}}>🤖</div>
              <div style={{fontWeight:700,fontSize:16,marginBottom:8,textAlign:'center'}}>How It Works</div>
              {['Describe your symptoms in the chat','AI asks smart follow-up questions','Receive possible conditions in cards','Always consult a real doctor'].map((s,i)=>(
                <div key={i} style={{display:'flex',gap:10,padding:'8px 0',borderBottom:i<3?'1px solid var(--border-hard)':'none'}}>
                  <div style={{
                    width:24,height:24,borderRadius:'50%' ,

                    color:'#fff',fontSize:12,fontWeight:800,

                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

      {activeTab==='articles'&&(
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {articles.map((a,i)=>(
            <div key={i} className="card" style={{padding:'16px 20px',display:'flex',alignItems:'center',gap:14,cursor:'pointer'}}>

              </div>
              <Icon name="chevRight" size={18} color="var(--text-4)"/>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════════ */
const App = ()=>{
  const [dark,setDark] = useState(false);
  const [page,setPage] = useState('home');
  const [drawerOpen,setDrawerOpen] = useState(false);
  const [sosOpen,setSosOpen] = useState(false);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  },[dark]);

  const pages = {
    home:     <HomePage onNav={setPage}/>,
    health:   <HealthTab/>,
    symptom:  <SymptomChecker/>,
    firstaid: <FirstAidTab/>,
    remedies: <RemediesTab/>,
    emergency:<EmergencyTab/>,
    profile:  <ProfileTab/>,
  };

  return(
    <div>
      <Navbar dark={dark} onToggleDark={()=>setDark(d=>!d)}
        onOpenDrawer={()=>setDrawerOpen(true)} onHome={()=>setPage('home')}/>

      {drawerOpen&&<Drawer active={page} onSelect={setPage} onClose={()=>setDrawerOpen(false)}/>}

      <main className="page-content">
        {pages[page]||<HomePage onNav={setPage}/>}
      </main>

      {/* Floating SOS */}
      <button className="sos-fab" onClick={()=>setSosOpen(true)} aria-label="Emergency SOS">
        <span className="sos-icon">🆘</span>
        <span>SOS</span>
      </button>

      {sosOpen&&<SOSModal onClose={()=>setSosOpen(false)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
